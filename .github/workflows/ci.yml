name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run database migrations
        run: |
          rm -f ci-migration.db
          DATABASE_URL=sqlite+pysqlite:///./ci-migration.db alembic upgrade head
          DATABASE_URL=sqlite+pysqlite:///./ci-migration.db alembic downgrade -1
          DATABASE_URL=sqlite+pysqlite:///./ci-migration.db alembic upgrade head

      - name: Run backend tests
        run: pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build

  compose-config:
    name: Docker Compose Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate compose configuration
        run: docker compose config
