services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://policylens:policylens@postgres:5432/policylens}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
      DEFAULT_MODEL_PROFILE: ${DEFAULT_MODEL_PROFILE:-china_balanced}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      QIANFAN_API_KEY: ${QIANFAN_API_KEY:-}
      HUNYUAN_API_KEY: ${HUNYUAN_API_KEY:-}
      VOLCARK_API_KEY: ${VOLCARK_API_KEY:-}
      ZHIPU_API_KEY: ${ZHIPU_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      SPARK_API_KEY: ${SPARK_API_KEY:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - qdrant

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://policylens:policylens@postgres:5432/policylens}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      STORAGE_DIR: ${STORAGE_DIR:-/app/storage}
      DEFAULT_MODEL_PROFILE: ${DEFAULT_MODEL_PROFILE:-china_balanced}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - qdrant

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: policylens
      POSTGRES_PASSWORD: policylens
      POSTGRES_DB: policylens
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.11.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
